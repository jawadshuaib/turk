services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "3124:3124"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    networks:
      - turk-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: turk
      POSTGRES_PASSWORD: turk
      POSTGRES_DB: turk
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - turk-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turk"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:

networks:
  turk-net:
    driver: bridge
